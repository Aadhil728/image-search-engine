<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — Image Catalog</title>
    <link rel="stylesheet" href="/static/header.css" />
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    {% include "header.html" %}

    <main class="container">
      <h1>Admin — Image Catalog</h1>

      <section id="uploader">
        <div class="uploader-header">
          <h2>Products</h2>
          <button id="add-product-btn" class="btn-add-product">
            + Add Product
          </button>
        </div>
        <button id="reindex-btn" class="btn-reindex">Rebuild Index</button>
      </section>

      <section id="catalog">
        <h2>Images</h2>
        <div
          style="
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.75rem;
          "
        >
          <input
            id="product-search"
            type="search"
            placeholder="Search filename, name, brand, sku..."
            style="flex: 1; padding: 0.5rem"
          />
          <input
            id="filter-brand"
            type="text"
            placeholder="Filter brand"
            style="width: 160px; padding: 0.5rem"
          />
          <input
            id="filter-sku"
            type="text"
            placeholder="Filter SKU"
            style="width: 120px; padding: 0.5rem"
          />
          <select id="per-page" style="padding: 0.5rem">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
          </select>
        </div>
        <div id="images-info"></div>
        <div style="margin-bottom: 1rem">
          <button
            id="delete-selected-btn"
            style="
              background-color: #ff4757;
              color: white;
              padding: 0.5rem 1rem;
              border: none;
              border-radius: 4px;
              cursor: pointer;
              display: none;
            "
          >
            Delete Selected
          </button>
        </div>
        <table id="images-table">
          <thead>
            <tr>
              <th style="width: 50px">
                <input type="checkbox" id="select-all-checkbox" />
              </th>
              <th>Preview</th>
              <th>SKU</th>
              <th>Brand</th>
              <th>Name</th>
              <th>Date</th>
              <th>Filename</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="pagination-controls"></div>
      </section>
    </main>

    <script src="/static/header.js"></script>
    <script src="/static/admin.js"></script>
  </body>
</html>
