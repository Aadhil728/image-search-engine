<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Product — Image Catalog</title>
    <link rel="stylesheet" href="/static/header.css" />
    <link rel="stylesheet" href="/static/add-product.css" />
  </head>
  <body>
    {% include "header.html" %}

    <main class="container">
      <div class="add-product-wrapper">
        <div class="back-button">
          <a href="/admin">&larr; Back to Admin</a>
        </div>

        <h1>Add New Product</h1>

        <div class="form-container">
          <form id="add-product-form">
            <!-- Image Upload Section -->
            <div class="form-section">
              <h2>Product Images</h2>
              <div class="file-upload-area" id="drop-zone">
                <svg
                  class="upload-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p class="upload-text">Drag images here or click to select</p>
                <input
                  id="file-input"
                  name="files"
                  type="file"
                  multiple
                  accept="image/*"
                  style="display: none"
                />
              </div>
              <div id="file-preview" class="file-preview"></div>
            </div>

            <!-- Product Details Section -->
            <div class="form-section">
              <h2>Product Details</h2>
              <div class="form-grid">
                <div class="form-group">
                  <label for="sku">SKU *</label>
                  <input
                    type="text"
                    id="sku"
                    name="sku"
                    placeholder="e.g. PROD-001"
                    required
                  />
                </div>

                <div class="form-group">
                  <label for="brand">Brand *</label>
                  <input
                    type="text"
                    id="brand"
                    name="brand"
                    placeholder="e.g. NABCO"
                    required
                  />
                </div>

                <div class="form-group">
                  <label for="product-name">Product Name *</label>
                  <input
                    type="text"
                    id="product-name"
                    name="name"
                    placeholder="e.g. Office Chair"
                    required
                  />
                </div>

                <div class="form-group">
                  <label for="product-date">Date</label>
                  <input type="date" id="product-date" name="date" />
                </div>

                <div class="form-group">
                  <label for="price">Price</label>
                  <input
                    type="number"
                    step="0.01"
                    id="price"
                    name="price"
                    placeholder="0.00"
                  />
                </div>
              </div>
            </div>

            <!-- Description Section -->
            <div class="form-section">
              <h2>Description</h2>
              <div class="form-group">
                <label for="description">Product Description</label>
                <textarea
                  id="description"
                  name="description"
                  placeholder="Enter detailed product description..."
                  rows="5"
                ></textarea>
              </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
              <button
                type="button"
                class="btn-cancel"
                onclick="window.location.href = '/admin'"
              >
                Cancel
              </button>
              <button type="submit" class="btn-submit">
                Upload & Add Product
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="/static/header.js"></script>
    <script src="/static/add-product.js"></script>
  </body>
</html>
